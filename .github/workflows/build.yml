name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk
    
    - name: Install python-for-android
      run: |
        pip install --upgrade pip setuptools wheel
        pip install python-for-android
    
    - name: Install project dependencies
      run: |
        pip install yt-dlp requests jnius plyer
    
    - name: Build APK
      env:
        COPY_OPENS_SOURCE: 1
      run: |
        cd android
        p4a apk --private创意 . --appname VDownloader --package org.vdownloader.app --sdk 21 --requirements python3,kivy,yt-dlp,requests,jnius,plyer --debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: VDownloader-APK
        path: android/bin/*.apk